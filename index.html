<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>퀘스트 ONLINE</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/galmuri@latest/dist/galmuri.css">
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-app-compat.js" onerror="window.__fbLoadFailed=true"></script>
<script src="https://www.gstatic.com/firebasejs/10.13.0/firebase-database-compat.js" onerror="window.__fbLoadFailed=true"></script>
<style>
  :root{
    --bg-dark:#14101c;
    --bg-panel:#241c30;
    --parchment:#e9dcb8;
    --parchment-dark:#c9b988;
    --ink:#2b2116;
    --gold:#d4af37;
    --gold-dim:#8a6f24;
    --good-blue:#3a5a9b;
    --evil-red:#9b3a3a;
    --success:#4a8f5c;
    --fail:#a33e3e;
    --shadow-black:#0a070d;
  }
  *{box-sizing:border-box; image-rendering:pixelated;}
  html,body{
    margin:0; padding:0; height:100%;
    background:
      radial-gradient(circle at 50% 0%, #2a2038 0%, var(--bg-dark) 60%);
    font-family:'Galmuri11','Galmuri9',monospace;
    color:var(--parchment);
    -webkit-font-smoothing:none;
  }
  #app{
    max-width:560px;
    margin:0 auto;
    min-height:100vh;
    padding:14px 12px 40px;
  }
  .crt-frame{
    border:6px solid var(--gold-dim);
    box-shadow:
      0 0 0 3px var(--shadow-black),
      0 0 0 6px var(--gold),
      0 0 0 9px var(--shadow-black),
      inset 0 0 24px rgba(0,0,0,.6);
    background:var(--bg-panel);
    border-radius:2px;
    padding:16px;
    margin-bottom:14px;
    position:relative;
  }
  .title-block{ text-align:center; margin-bottom:18px; }
  .title-block h1{
    font-size:26px; letter-spacing:4px; margin:0 0 4px;
    color:var(--gold);
    text-shadow:2px 2px 0 var(--shadow-black), 0 0 12px rgba(212,175,55,.4);
  }
  .title-block p{ font-size:11px; color:var(--parchment-dark); margin:0; letter-spacing:1px;}

  .panel{
    background:var(--parchment);
    color:var(--ink);
    border:3px solid var(--ink);
    box-shadow: 4px 4px 0 var(--shadow-black);
    padding:14px;
    margin-bottom:12px;
    position:relative;
  }
  .panel::before{
    content:''; position:absolute; inset:3px;
    border:1px solid var(--gold-dim); pointer-events:none;
  }
  .panel h2{
    font-size:14px; margin:0 0 10px; color:var(--ink);
    border-bottom:2px solid var(--ink); padding-bottom:6px;
    letter-spacing:1px;
  }
  .panel h2 .tag{
    float:right; font-size:10px; color:var(--gold-dim);
  }

  label{ display:block; font-size:12px; margin:10px 0 4px; letter-spacing:.5px;}
  input[type=text]{
    width:100%; padding:10px; font-family:inherit; font-size:15px;
    border:2px solid var(--ink); background:#fff8e7; color:var(--ink);
    letter-spacing:1px;
  }
  input[type=text]:focus{ outline:2px solid var(--gold); }

  button{
    font-family:inherit; cursor:pointer; letter-spacing:1px;
    border:2px solid var(--ink); background:var(--gold);
    color:var(--ink); padding:11px 14px; font-size:13px;
    box-shadow:3px 3px 0 var(--shadow-black);
    transition:transform .05s;
  }
  button:active{ transform:translate(2px,2px); box-shadow:1px 1px 0 var(--shadow-black); }
  button:disabled{ background:#9a9a9a; color:#555; cursor:not-allowed; box-shadow:2px 2px 0 var(--shadow-black); }
  button.full{ width:100%; margin-top:10px; }
  button.evil{ background:var(--evil-red); color:#fff2e0; }
  button.good{ background:var(--good-blue); color:#fff2e0; }
  button.ghost{ background:transparent; color:var(--parchment); border-color:var(--parchment-dark); box-shadow:none; }

  .row{ display:flex; gap:8px; }
  .row > *{ flex:1; }

  .player-list{ list-style:none; margin:0; padding:0; }
  .player-list li{
    display:flex; align-items:center; gap:8px;
    padding:8px 6px; border-bottom:1px dashed var(--gold-dim);
    font-size:13px;
  }
  .player-list li:last-child{ border-bottom:none; }
  .dot{ width:9px; height:9px; border-radius:50%; background:#4a8f5c; flex-shrink:0; }
  .dot.off{ background:#999; }
  .crown{ color:var(--gold-dim); font-weight:bold; }
  .badge{
    font-size:9px; padding:2px 6px; border:1px solid var(--ink);
    background:var(--parchment-dark); margin-left:auto;
  }

  .quest-track{ display:flex; justify-content:space-between; gap:6px; margin:8px 0 4px; }
  .quest-slot{
    flex:1; aspect-ratio:1; border:2px solid var(--ink);
    display:flex; align-items:center; justify-content:center;
    font-size:16px; background:#fff8e7; position:relative;
  }
  .quest-slot.success{ background:var(--success); color:#fff; }
  .quest-slot.fail{ background:var(--fail); color:#fff; }
  .quest-slot.current{ box-shadow:0 0 0 3px var(--gold); }
  .quest-slot .need2{
    position:absolute; bottom:-14px; left:0; right:0; text-align:center;
    font-size:8px; color:var(--evil-red); font-weight:bold;
  }
  .reject-track{ display:flex; gap:4px; margin:14px 0 4px; align-items:center; }
  .reject-track .r{ width:12px; height:12px; border:2px solid var(--ink); background:#fff8e7;}
  .reject-track .r.used{ background:var(--evil-red); }

  .role-card{
    background:linear-gradient(160deg,#fff8e7,#e9dcb8);
    border:3px solid var(--ink); padding:18px; text-align:center;
    margin-bottom:12px;
  }
  .role-card .role-name{ font-size:20px; margin:6px 0; letter-spacing:2px;}
  .role-card .align{
    display:inline-block; padding:3px 10px; font-size:11px;
    border-radius:2px; margin-bottom:8px;
  }
  .align.good{ background:var(--good-blue); color:#fff; }
  .align.evil{ background:var(--evil-red); color:#fff; }
  .role-card .desc{ font-size:12px; line-height:1.6; color:#40331f; }
  .info-list{ font-size:12px; margin-top:10px; text-align:left; background:#fff8e788; padding:8px; border:1px dashed var(--gold-dim); }

  .checkbox-row{
    display:flex; align-items:center; gap:8px; padding:8px 6px;
    border-bottom:1px dashed var(--gold-dim); font-size:13px; cursor:pointer;
  }
  .checkbox-row input{ width:18px; height:18px; }

  .msg{ font-size:12px; text-align:center; color:var(--parchment-dark); padding:10px; }
  .center{ text-align:center; }
  .small{ font-size:10px; color:var(--gold-dim); }
  .room-code-display{
    font-size:28px; letter-spacing:6px; text-align:center;
    color:var(--gold); margin:6px 0 2px; text-shadow:2px 2px 0 var(--shadow-black);
  }
  .toggle-row{ display:flex; align-items:center; justify-content:space-between; padding:8px 0; font-size:12px; border-bottom:1px dashed var(--gold-dim); }

  .winner-banner{
    font-size:22px; text-align:center; padding:16px; margin-bottom:10px;
    letter-spacing:3px; border:3px solid var(--ink);
  }
  .winner-banner.good{ background:var(--good-blue); color:#fff; }
  .winner-banner.evil{ background:var(--evil-red); color:#fff; }

  .reveal-item{ display:flex; justify-content:space-between; padding:6px 0; border-bottom:1px dashed var(--gold-dim); font-size:12px;}
  .align-pill{ font-size:10px; padding:2px 8px; border-radius:2px;}
  .align-pill.good{ background:var(--good-blue); color:#fff; }
  .align-pill.evil{ background:var(--evil-red); color:#fff; }

  ::selection{ background:var(--gold); color:var(--ink); }

  /* ---------- 요약 카드 (규칙 보기) ---------- */
  .rules-fab{
    position:fixed; top:12px; right:12px; z-index:500;
    height:38px; border-radius:19px;
    background:var(--gold); color:var(--ink); border:2px solid var(--ink);
    box-shadow:3px 3px 0 var(--shadow-black);
    font-family:inherit; font-size:12px; font-weight:bold; letter-spacing:.5px;
    display:flex; align-items:center; justify-content:center; gap:6px;
    padding:0 14px 0 12px; cursor:pointer; white-space:nowrap;
  }
  .rules-fab .ico{ font-size:16px; }
  @keyframes rulesPulse{
    0%,100%{ box-shadow:3px 3px 0 var(--shadow-black); }
    50%{ box-shadow:3px 3px 0 var(--shadow-black), 0 0 0 4px rgba(212,175,55,.45); }
  }
  .rules-fab.pulse{ animation:rulesPulse 1.6s ease-in-out 3; }
  .modal-overlay{
    position:fixed; inset:0; background:rgba(8,6,12,.82);
    z-index:900; display:none; align-items:flex-start; justify-content:center;
    overflow-y:auto; padding:16px 10px 60px;
  }
  .modal-overlay.open{ display:flex; }
  .modal-box{
    background:var(--parchment); color:var(--ink); max-width:560px; width:100%;
    border:3px solid var(--ink); box-shadow:5px 5px 0 var(--shadow-black);
    padding:16px; position:relative;
  }
  .modal-box h2.modal-title{
    font-size:17px; margin:0 0 4px; color:var(--ink); letter-spacing:1px;
    border-bottom:2px solid var(--ink); padding-bottom:8px;
  }
  .modal-close{
    position:absolute; top:10px; right:10px; width:30px; height:30px;
    background:var(--evil-red); color:#fff; border:2px solid var(--ink);
    box-shadow:2px 2px 0 var(--shadow-black); font-size:14px; padding:0; cursor:pointer;
  }
  .modal-tabs{ display:flex; gap:6px; margin:10px 0 12px; }
  .modal-tab{
    flex:1; text-align:center; padding:8px 4px; font-size:12px; cursor:pointer;
    border:2px solid var(--ink); background:#e3d5aa;
  }
  .modal-tab.active{ background:var(--gold); font-weight:bold; }
  .modal-section{ display:none; }
  .modal-section.active{ display:block; }
  .rule-role-item{
    display:flex; gap:10px; padding:9px 4px; border-bottom:1px dashed var(--gold-dim);
    align-items:flex-start; font-size:12px;
  }
  .rule-role-item .align-pill{ flex-shrink:0; margin-top:2px; }
  .rule-role-item b{ display:block; margin-bottom:2px; font-size:13px; }
  .rule-flow-step{
    display:flex; gap:8px; padding:8px 2px; border-bottom:1px dashed var(--gold-dim); font-size:12px; align-items:flex-start;
  }
  .rule-flow-step .stepnum{
    flex-shrink:0; width:20px; height:20px; border-radius:50%; background:var(--ink); color:var(--gold);
    display:flex; align-items:center; justify-content:center; font-size:11px;
  }
  .rule-table{ width:100%; border-collapse:collapse; font-size:11px; margin-top:6px; }
  .rule-table th, .rule-table td{ border:1px solid var(--ink); padding:5px 3px; text-align:center; }
  .rule-table th{ background:#d8c896; }
  .rule-note{ font-size:11px; color:#5a4a2f; margin-top:8px; line-height:1.6; }
</style>
</head>
<body>
<div id="app"><div id="gameArea"></div><div id="timerArea"></div><div id="logArea"></div><div id="chatArea"></div></div>
<button class="rules-fab pulse" id="rulesFab" title="규칙 요약 카드"><span class="ico">📜</span>요약 카드</button>
<div class="modal-overlay" id="rulesModal">
  <div class="modal-box">
    <button class="modal-close" id="rulesCloseBtn">✕</button>
    <h2 class="modal-title">퀘스트 (감독판) 요약 카드</h2>
    <div class="modal-tabs">
      <div class="modal-tab active" data-tab="roles">역할 능력</div>
      <div class="modal-tab" data-tab="flow">진행 순서</div>
      <div class="modal-tab" data-tab="table">인원별 표</div>
    </div>
    <div id="rulesContent"></div>
  </div>
</div>

<script>
/* =========================================================
   퀘스트 ONLINE — Firebase Realtime Database 기반 멀티플레이어
   ========================================================= */

          ▸ 광고 차단 확장 프로그램을 잠시 꺼보세요.<br><br>
          ▸ 인터넷 연결 상태를 확인해주세요.<br><br>
          ▸ 그래도 안 되면 브라우저에서 F12(개발자 도구) → Network 탭을 열고 새로고침해서, 빨간색(실패)으로 표시되는 요청이 있는지 확인해주세요.
        </div>
      </div>
    </div>`;
  throw new Error('Firebase SDK load failed — see diagnostic screen');
}


const firebaseConfig = {
  apiKey: "AIzaSyAERwA20cNN8IFx1lKbINYfpJQxTWgX0yc",
  authDomain: "quest-online-6b85b.firebaseapp.com",
  databaseURL: "https://quest-online-6b85b-default-rtdb.firebaseio.com",
  projectId: "quest-online-6b85b",
  storageBucket: "quest-online-6b85b.firebasestorage.app",
  messagingSenderId: "99941326697",
  appId: "1:99941326697:web:6623d7b68d4ec6fbfaa7f8"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

/* ---------- 유틸 ---------- */
function uid(){
  return 'p_' + Math.random().toString(36).slice(2,10);
}
function roomCodeGen(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s='';
  for(let i=0;i<4;i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}
function esc(s){
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* =========================================================
   게임 데이터 — 퀘스트 (감독판 / Director's Cut)
   ========================================================= */
const ROLE_INFO = {
  servant:      {name:'충성스러운 신하', align:'good', desc:'특별한 능력이 없습니다. 대화와 원정 결과로 진실을 추리하세요.'},
  cleric:       {name:'성직자',          align:'good', desc:'첫 번째 원정대장의 소속(선/악)을 알고 있습니다.'},
  youth:        {name:'젊은 기사',        align:'good', desc:'마법 토큰을 받으면 반드시 실패 카드를 내야 합니다.'},
  troublemaker: {name:'말썽꾼',          align:'good', desc:'부적으로 조사당하면 반드시 자신을 악으로 밝혀야 합니다.'},
  duke:         {name:'공작',            align:'good', desc:'선의 마지막 기회에서, 한 사람의 지목을 무효화할 수 있습니다.'},
  archduke:     {name:'대공',            align:'good', desc:'선의 마지막 기회에서, 한 사람의 지목 대상을 다른 사람으로 바꿀 수 있습니다.'},
  minion:       {name:'모드레드의 하수인', align:'evil', desc:'특별한 능력이 없습니다. 다른 악의 동료들을 알아볼 수 있습니다.'},
  morgan:       {name:'모르간 르 페이',    align:'evil', desc:'마법 토큰에 면역이라, 성공/실패를 자유롭게 낼 수 있습니다.'},
  hunter:       {name:'눈먼 사냥꾼',      align:'evil', desc:'선의 마지막 기회 대신 "사냥"을 선택해, 선 역할 2명의 정체를 정확히 맞히면 악이 승리합니다.'}
};
const GOOD_ROLE_KEYS = ['servant','cleric','youth','troublemaker','duke','archduke'];

function missionFor(n){
  if(n<=7) return {sizes:[3,2,3,4,3], fails:[1,1,1,2,1]};
  return {sizes:[4,3,4,5,4], fails:[1,1,2,2,1]};
}
function amuletCheckpointsFor(n){
  if(n===5) return [];
  if(n===6) return [4];
  if(n===7) return [3,4];
  return [2,3,4]; // 8,9,10
}
function minionCountFor(n){
  return {5:1,6:1,7:2,8:2,9:3,10:3}[n];
}

/* secondChoice: 'youth' 또는 'troublemaker' (6인 이상부터 선택 가능) */
function buildRoleSet(n, secondChoice){
  let goodPool = [];
  let reserve = null;
  if(n===5){
    let pool = shuffle(['cleric','youth','servant']);
    reserve = pool.pop();
    goodPool = pool; // 2장만 배분
  } else if(n===6 || n===7){
    goodPool = ['cleric', secondChoice, 'duke'];
  } else if(n===8){
    goodPool = ['cleric', secondChoice, 'duke', 'servant'];
  } else if(n===9){
    goodPool = ['cleric', secondChoice, 'archduke', 'servant'];
  } else if(n===10){
    goodPool = ['cleric', secondChoice, 'duke', 'archduke', 'servant'];
  }
  let evilPool = ['morgan','hunter'];
  const mCount = minionCountFor(n);
  for(let i=0;i<mCount;i++) evilPool.push('minion');
  const roles = shuffle([...goodPool, ...evilPool]);
  return {roles, reserve};
}

/* ---------- 로컬 상태 ---------- */
let myId = null;
let myName = null;
let myRoom = null;
let roomRef = null;
let roomListener = null;
let teamPickLocal = [];
let magicPickLocal = null;
let handoverLeaderPick = null;
let handoverAmuletPick = null;
let amuletTargetPick = null;
let glcPickLocal = [];
let huntPickLocal = [null, null];
let huntRolePickLocal = [null, null];

/* ---------- 화면 진입점 ---------- */
function boot(){
  const hash = location.hash.replace('#','').toUpperCase();
  render(); // 시작화면
  if(hash && hash.length===4){
    document.getElementById('joinCodeInput') && (document.getElementById('joinCodeInput').value = hash);
  }
}

/* ================= 방 생성 / 입장 ================= */
function createRoom(name){
  myName = name.trim().slice(0,10) || '플레이어';
  myId = uid();
  const code = roomCodeGen();
  const roomData = {
    createdAt: Date.now(),
    hostId: myId,
    phase: 'lobby',
    settings: { secondGoodChoice:'youth', discussionSeconds: 180 },
    players: {
      [myId]: { name: myName, joinedAt: Date.now(), connected:true }
    }
  };
  db.ref('rooms/'+code).set(roomData).then(()=>{
    myRoom = code;
    localStorage.setItem('quest_room', code);
    localStorage.setItem('quest_pid_'+code, myId);
    localStorage.setItem('quest_name_'+code, myName);
    attachRoom(code);
  });
}

function joinRoom(name, code){
  code = code.trim().toUpperCase();
  myName = name.trim().slice(0,10) || '플레이어';
  const savedId = localStorage.getItem('quest_pid_'+code);
  db.ref('rooms/'+code).once('value').then(snap=>{
    if(!snap.exists()){
      alert('존재하지 않는 방 코드예요. 다시 확인해주세요.');
      return;
    }
    const data = snap.val();
    if(savedId && data.players && data.players[savedId]){
      myId = savedId;
    } else {
      myId = uid();
    }
    if(data.phase && data.phase!=='lobby' && !(data.players && data.players[myId])){
      alert('이미 게임이 시작된 방이에요. 새로 입장할 수 없어요.');
      return;
    }
    db.ref(`rooms/${code}/players/${myId}`).update({
      name: myName, joinedAt: Date.now(), connected:true
    }).then(()=>{
      myRoom = code;
      localStorage.setItem('quest_room', code);
      localStorage.setItem('quest_pid_'+code, myId);
      localStorage.setItem('quest_name_'+code, myName);
      attachRoom(code);
    });
  });
}

function attachRoom(code){
  roomRef = db.ref('rooms/'+code);
  db.ref(`rooms/${code}/players/${myId}/connected`).onDisconnect().set(false);
  roomListener = roomRef.on('value', snap=>{
    const data = snap.val();
    if(!data){ leaveToStart(); return; }
    if(data.phase==='lobby' && data.players && myId && !data.players[myId]){
      alert('방장에 의해 강퇴되었습니다.');
      leaveToStart();
      return;
    }
    render(data);
  });
  initChat();
  initLog();
  initTimer();
}

function leaveToStart(){
  if(roomListener && roomRef) roomRef.off('value', roomListener);
  teardownChat();
  teardownLog();
  teardownTimer();
  myRoom=null; roomRef=null; roomListener=null;
  localStorage.removeItem('quest_room');
  render();
}

function renderTimerState(t){

  if(!panel) return;

    if(remain<=0 && timerInterval){ clearInterval(timerInterval); timerInterval=null; if(disp) disp.textContent='⏰ 시간 종료!'; }
  };
  tick();
  timerInterval = setInterval(tick, 1000);

const BANNED_WORDS = [
  '씨발','씨팔','시발','시팔','ㅅㅂ','ㅆㅂ','병신','ㅂㅅ','개새끼','개새','새끼','좆','존나','좇',
  '지랄','ㅈㄹ','미친놈','미친년','썅','개년','개자식','걸레','창녀','fuck','fucking','shit','bitch',
  'asshole','bastard','dick','pussy','cunt','nigger','nigga'
];
function filterProfanity(text){
  let result = text;
  BANNED_WORDS.forEach(w=>{
    if(w.length===0) return;
    const pattern = w.split('').map(ch=>ch.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')).join('[\\s\\W]*');
    const re = new RegExp(pattern, 'gi');
    result = result.replace(re, m=>'*'.repeat(m.length));
  });
  return result;
}

/* ---------- 자동 진행 체크 ---------- */
function autoResolveChecks(data){
  if(!data || !myRoom) return;
  const rr = db.ref('rooms/'+myRoom);

  if(data.phase === 'reveal' && data.players){
    const allReady = Object.values(data.players).every(p=>p.ready);
    if(!allReady) return;
    rr.transaction(room=>{
      if(!room || room.phase!=='reveal') return;
      if(!room.players || !Object.values(room.players).every(p=>p.ready)) return;
      room.phase = 'team';
      return room;
    });
  } else if(data.phase === 'quest' && data.team){
    const team = data.team;
    const cards = data.questCards || {};
    if(team.length===0 || Object.keys(cards).length < team.length) return;
    rr.transaction(room=>{
      if(!room || room.phase!=='quest') return;
      const rteam = room.team||[];
      const rcards = room.questCards||{};
      if(Object.keys(rcards).length < rteam.length) return;
      const fails = rteam.filter(id=>rcards[id]==='fail').length;
      const needFails = room.missionFails[room.quest-1];
      const result = fails >= needFails ? 'fail' : 'success';
      const newTrack = room.track.slice();
      newTrack[room.quest-1] = result;
      const successCount = newTrack.filter(t=>t==='success').length;
      const failCount = newTrack.filter(t=>t==='fail').length;
      room.track = newTrack;
      room.lastQuestFails = fails;
      room.lastCompletedQuest = room.quest;
      room.log = {...(room.log||{}), [logKey()]: {
        type:'quest', quest: room.quest,
        leaderId: room.currentLeaderId, leaderName: room.players[room.currentLeaderId].name,
        team: rteam.map(id=>room.players[id].name),
        result, fails, ts: Date.now()
      }};
      if(successCount >= 3){
        room.phase='end'; room.winner='good';
        room.winReason='선이 세 번째 원정에 성공했습니다!';
        room.log[logKey()] = {type:'end', winner:room.winner, winReason:room.winReason, ts:Date.now()};
      } else if(failCount >= 3){
        room.phase='goodslastchance';
        room.glc = {hunterDecision:null, pointing:null};
        room.timer = {startedAt: Date.now(), duration: 300, label: '눈먼 사냥꾼 결정 시간 (5분)'};
      } else {
        room.phase='handover';
        room.quest = room.quest+1;
        room.team=null; room.magicTarget=null; room.questCards=null;
      }
      return room;
    });
  } else if(data.phase === 'goodslastchance' && data.glc && data.glc.hunterDecision==='skip'){
    const total = data.order.length;
    const pointing = data.glc.pointing || {};
    if(Object.keys(pointing).length < total) return;
    rr.transaction(room=>{
      if(!room || room.phase!=='goodslastchance' || !room.glc || room.glc.hunterDecision!=='skip') return;
      const p = room.glc.pointing||{};
      if(Object.keys(p).length < room.order.length) return;
      const wrongs = wrongPicksList(room, p);
      if(wrongs.length===0){
        // 잘못된 지목이 없으면 공작/대공이 있어도 개입할 대상이 없으므로 바로 판정
        const outcome = computeGLCOutcome(room);
        room.phase='end'; room.winner=outcome.winner; room.winReason=outcome.winReason;
        room.log = {...(room.log||{}), [logKey()]: {type:'end', winner:room.winner, winReason:room.winReason, ts:Date.now()}};
        return room;
      }
      const dukeId = room.order.find(id=>room.players[id].role==='duke') || null;
      const archdukeId = room.order.find(id=>room.players[id].role==='archduke') || null;
      if(dukeId || archdukeId){
        room.phase = 'glcresolve';
        room.glc.resolveStage = dukeId ? 'duke' : 'archduke';
        room.glc.dukeId = dukeId;
        room.glc.archdukeId = archdukeId;
      } else {
        const outcome = computeGLCOutcome(room);
        room.phase='end'; room.winner=outcome.winner; room.winReason=outcome.winReason;
        room.log = {...(room.log||{}), [logKey()]: {type:'end', winner:room.winner, winReason:room.winReason, ts:Date.now()}};
      }
      return room;
    });
  }
}

/* ---------- 공작 / 대공: 지목 결과 보정 ---------- */
function wrongPicksList(room, pointingOverride){
  const pointing = pointingOverride || (room.glc && room.glc.pointing) || {};
  const goodIds = room.order.filter(id=>room.players[id].align==='good');
  const evilSet = new Set(room.order.filter(id=>room.players[id].align==='evil'));
  const list = [];
  goodIds.forEach(pid=>{
    (pointing[pid]||[]).forEach(tid=>{
      if(!evilSet.has(tid)) list.push({pointerId:pid, targetId:tid});
    });
  });
  return list;
}
function pointingAfterDuke(room){
  const orig = (room.glc && room.glc.pointing) || {};
  const dukeR = room.glc && room.glc.dukeRemoval;
  const result = {};
  Object.keys(orig).forEach(pid=>{
    let list = orig[pid].slice();
    if(dukeR && typeof dukeR==='object' && dukeR.pointerId===pid){
      list = list.filter(t=>t!==dukeR.targetId);
    }
    result[pid] = list;
  });
  return result;
}
function effectivePointing(room){
  const afterDuke = pointingAfterDuke(room);
  const archR = room.glc && room.glc.archdukeRedirect;
  const result = {};
  Object.keys(afterDuke).forEach(pid=>{
    let list = afterDuke[pid].slice();
    if(archR && typeof archR==='object' && archR.pointerId===pid){
      list = list.map(t=> t===archR.targetId ? archR.newTargetId : t);
    }
    result[pid] = list;
  });
  return result;
}
function computeGLCOutcome(room){
  const pointing = effectivePointing(room);
  const goodIds = room.order.filter(id=>room.players[id].align==='good');
  const evilIds = room.order.filter(id=>room.players[id].align==='evil');
  const goodPicks = goodIds.flatMap(id=> pointing[id]||[]);
  const onlyEvilPointed = goodPicks.length>0 && goodPicks.every(id=>evilIds.includes(id));
  const allEvilCovered = evilIds.every(id=>goodPicks.includes(id));
  const pointingWin = onlyEvilPointed && allEvilCovered;
  const leadersAll = [...(room.leadersUsed||[]), room.currentLeaderId];
  const veteranWin = leadersAll.length>0 && leadersAll.every(id=>room.players[id].align==='evil');
  if(pointingWin || veteranWin){
    return {winner:'good', winReason: veteranWin ? '지금까지의 원정대장이 모두 악이었습니다.' : '선이 악의 정체를 정확히 지목했습니다.'};
  }
  return {winner:'evil', winReason:'선이 마지막 기회에서 악을 가려내지 못했습니다.'};
}
function submitDukeChoice(data, choice){
  // choice: {pointerId, targetId} 또는 'skip'
  const glc = data.glc||{};
  const nextRoom = {...data, glc:{...glc, dukeRemoval:choice}};
  const remaining = wrongPicksList(nextRoom, pointingAfterDuke(nextRoom));
  const updates = {
    ['glc/dukeRemoval']: choice,
    ['log/'+logKey()]: {type:'duke', used: choice!=='skip', ts:Date.now()}
  };
  if(glc.archdukeId && remaining.length>0){
    updates['glc/resolveStage'] = 'archduke';
  } else {
    const outcome = computeGLCOutcome(nextRoom);
    updates.phase = 'end';
    updates.winner = outcome.winner;
    updates.winReason = outcome.winReason;
    updates['log/'+logKey()] = {type:'end', winner:outcome.winner, winReason:outcome.winReason, ts:Date.now()};
  }
  db.ref('rooms/'+myRoom).update(updates);
}
function submitArchdukeChoice(data, choice){
  // choice: {pointerId, targetId, newTargetId} 또는 'skip'
  const glc = data.glc||{};
  const nextRoom = {...data, glc:{...glc, archdukeRedirect:choice}};
  const outcome = computeGLCOutcome(nextRoom);
  const k1 = logKey(), k2 = logKey();
  db.ref('rooms/'+myRoom).update({
    ['glc/archdukeRedirect']: choice,
    phase: 'end',
    winner: outcome.winner,
    winReason: outcome.winReason,
    ['log/'+k1]: {type:'archduke', used: choice!=='skip', ts:Date.now()},
    ['log/'+k2]: {type:'end', winner:outcome.winner, winReason:outcome.winReason, ts:Date.now()}
  });
}

/* ---------- 호스트: 응답 없는 인원을 무시하고 강제 진행 ---------- */
function forceAdvance(data){
  if(!confirm('아직 응답하지 않은 인원이 있을 수 있습니다. 무시하고 강제로 다음 단계로 진행할까요?')) return;
  const rr = db.ref('rooms/'+myRoom);
  if(data.phase==='reveal'){
    const updates = {};
    Object.keys(data.players).forEach(id=>{ updates['players/'+id+'/ready'] = true; });
    rr.update(updates);
  } else if(data.phase==='quest'){
    const updates = {};
    data.team.forEach(id=>{ if(!data.questCards || !data.questCards[id]) updates['questCards/'+id] = 'success'; });
    if(Object.keys(updates).length) rr.update(updates);
  } else if(data.phase==='goodslastchance' && data.glc && !data.glc.hunterDecision){
    rr.update({['glc/hunterDecision']:'skip', ['log/'+logKey()]: {type:'hunterDecision', choice:'skip', ts:Date.now()}});
    cancelTimer();
  } else if(data.phase==='goodslastchance' && data.glc && data.glc.hunterDecision==='skip'){
    const updates = {};
    data.order.forEach(id=>{
      if(!data.glc.pointing || !data.glc.pointing[id]){
        const others = data.order.filter(x=>x!==id).slice(0,2);
        updates['glc/pointing/'+id] = others;
      }
    });
    if(Object.keys(updates).length) rr.update(updates);
  } else if(data.phase==='glcresolve' && data.glc){
    if(data.glc.resolveStage==='duke'){
      submitDukeChoice(data, 'skip');
    } else if(data.glc.resolveStage==='archduke'){
      submitArchdukeChoice(data, 'skip');
    }
  }
}

/* ================= 원정대 지명 + 마법 토큰 ================= */
function proposeTeam(data){
  const need = data.missionSizes[data.quest-1];
  if(teamPickLocal.length !== need){
    alert(need+'명을 정확히 선택해주세요.');
    return;
  }
  if(!magicPickLocal || !teamPickLocal.includes(magicPickLocal)){
    alert('마법 토큰을 줄 원정대원을 선택해주세요.');
    return;
  }
  db.ref('rooms/'+myRoom).update({
    phase:'quest',
    team: teamPickLocal,
    magicTarget: magicPickLocal,
    questCards: null
  });
  teamPickLocal = [];
  magicPickLocal = null;
}

/* ================= 원정 수행 ================= */
function allowedQuestActions(role, align, hasMagic){
  if(role==='youth') return hasMagic ? ['fail'] : ['success'];
  if(role==='morgan') return ['success','fail'];
  if(align==='good') return ['success'];
  return hasMagic ? ['success'] : ['success','fail'];
}
function submitQuestCard(card){
  db.ref(`rooms/${myRoom}/questCards/${myId}`).set(card);
}

/* ================= 대장 교체 + 부적 ================= */
function eligibleNextLeaders(data){
  return data.order.filter(id=>
    id!==data.currentLeaderId &&
    !(data.leadersUsed||[]).includes(id) &&
    !(data.amuletHolders||[]).includes(id)
  );
}
function eligibleAmuletRecipients(data, nextLeaderId){
  return data.order.filter(id=>
    !(data.amuletHolders||[]).includes(id) &&
    id!==nextLeaderId &&
    id!==data.currentLeaderId &&
    !(data.leadersUsed||[]).includes(id)
  );
}
function submitHandover(data){
  const needAmulet = (data.amuletCheckpoints||[]).includes(data.lastCompletedQuest);
  if(!handoverLeaderPick){ alert('다음 원정대장을 선택해주세요.'); return; }
  if(needAmulet && !handoverAmuletPick){ alert('부적 토큰을 줄 플레이어를 선택해주세요.'); return; }
  const updates = {
    leadersUsed: [...(data.leadersUsed||[]), data.currentLeaderId],
    currentLeaderId: handoverLeaderPick,
    phase: needAmulet ? 'amulet' : 'team'
  };
  if(needAmulet){
    updates.amuletHolders = [...(data.amuletHolders||[]), handoverAmuletPick];
    updates.pendingAmuletRecipient = handoverAmuletPick;
    updates['log/'+logKey()] = {
      type:'amulet', quest: data.lastCompletedQuest,
      holderId: handoverAmuletPick, holderName: data.players[handoverAmuletPick].name,
      ts: Date.now()
    };
  }
  db.ref('rooms/'+myRoom).update(updates);
  handoverLeaderPick = null; handoverAmuletPick = null;
}
function submitAmuletInvestigation(data){
  if(!amuletTargetPick){ alert('조사할 대상을 선택해주세요.'); return; }
  const targetId = amuletTargetPick;
  const targetRole = data.players[targetId].role;
  const result = targetRole==='troublemaker' ? 'evil' : data.players[targetId].align;
  db.ref('rooms/'+myRoom).update({
    fadedHolders: [...(data.fadedHolders||[]), targetId],
    ['players/'+data.pendingAmuletRecipient+'/lastInvestigation']: {targetId, targetName:data.players[targetId].name, result},
    pendingAmuletRecipient: null,
    phase: 'team'
  });
  amuletTargetPick = null;
}

/* ================= 선의 마지막 기회 ================= */
function hunterDecide(choice){
  const entry = {type:'hunterDecision', choice, ts:Date.now()};
  if(choice==='hunt'){
    db.ref('rooms/'+myRoom).update({phase:'hunt', ['glc/hunterDecision']:'hunt', ['log/'+logKey()]: entry});
  } else {
    db.ref('rooms/'+myRoom).update({['glc/hunterDecision']:'skip', ['log/'+logKey()]: entry});
  }
  cancelTimer();
}
function submitGlcPointing(data){
  if(glcPickLocal.length !== 2){
    alert('정확히 두 명을 지목해주세요.');
    return;
  }
  db.ref(`rooms/${myRoom}/glc/pointing/${myId}`).set(glcPickLocal);
  glcPickLocal = [];
}

/* ================= 사냥 (The Hunt) ================= */
function goodRolesInPlay(data){
  const s = new Set();
  data.order.forEach(id=>{ if(data.players[id].align==='good') s.add(data.players[id].role); });
  if(data.reserveRole) s.add(data.reserveRole);
  return [...s];
}
function submitHunt(data){
  if(huntPickLocal[0]===null || huntPickLocal[1]===null || !huntRolePickLocal[0] || !huntRolePickLocal[1]){
    alert('두 명의 대상과 역할을 모두 선택해주세요.'); return;
  }
  if(huntPickLocal[0]===huntPickLocal[1]){
    alert('서로 다른 두 대상을 선택해주세요.'); return;
  }
  if(huntRolePickLocal[0]!=='cleric' && huntRolePickLocal[1]!=='cleric'){
    alert('두 대상 중 한 명은 반드시 "성직자"로 지목해야 합니다.'); return;
  }
  const picks = [
    {target:huntPickLocal[0], role:huntRolePickLocal[0]},
    {target:huntPickLocal[1], role:huntRolePickLocal[1]}
  ];
  const actualRoleOf = (t)=> t==='reserve' ? data.reserveRole : data.players[t].role;
  const correct = picks.every(p=>{
    const actual = actualRoleOf(p.target);
    return p.role===actual || (p.role==='servant' && (actual==='duke'||actual==='archduke'));
  });
  const winner = correct ? 'evil' : 'good';
  const winReason = correct ? '눈먼 사냥꾼이 선의 정체를 정확히 맞혔습니다.' : '눈먼 사냥꾼이 선의 정체를 맞히지 못했습니다.';
  const k1 = logKey(), k2 = logKey();
  db.ref('rooms/'+myRoom).update({
    phase:'end', winner, winReason, huntPicks:picks,
    ['log/'+k1]: {type:'hunt', correct, ts:Date.now()},
    ['log/'+k2]: {type:'end', winner, winReason, ts:Date.now()}
  });
}

/* ================= 재시작 ================= */
function playAgain(data){
  const playersReset = {};
  Object.keys(data.players).forEach(pid=>{
    playersReset[pid] = {
      name:data.players[pid].name,
      connected:data.players[pid].connected,
      joinedAt:data.players[pid].joinedAt
    };
  });
  db.ref('rooms/'+myRoom).update({
    phase:'lobby', order:null, firstLeaderId:null, currentLeaderId:null, leadersUsed:null,
    quest:null, track:null, team:null, magicTarget:null, questCards:null,
    amuletHolders:null, fadedHolders:null, pendingAmuletRecipient:null, reserveRole:null,
    missionSizes:null, missionFails:null, amuletCheckpoints:null,
    lastCompletedQuest:null, lastQuestFails:null, glc:null, huntPicks:null,
    winner: null, winReason: null, log: null, timer: null,
    players: playersReset
  });
}

/* =========================================================
   렌더링
   ========================================================= */
function render(data){
  const app = document.getElementById('gameArea');
  if(!myRoom || !data){
    app.innerHTML = screenStart();
    bindStartScreen();
    return;
  }
  autoResolveChecks(data);
  const warn = data.phase==='lobby' ? '' : connectionWarningHtml(data);
  switch(data.phase){
    case 'lobby': app.innerHTML = screenLobby(data); bindLobby(data); break;
    case 'reveal': app.innerHTML = warn+screenReveal(data); bindReveal(data); break;
    case 'team': app.innerHTML = warn+screenTeam(data); bindTeam(data); break;
    case 'quest': app.innerHTML = warn+screenQuest(data); bindQuest(data); break;
    case 'handover': app.innerHTML = warn+screenHandover(data); bindHandover(data); break;
    case 'amulet': app.innerHTML = warn+screenAmulet(data); bindAmulet(data); break;
    case 'goodslastchance': app.innerHTML = warn+screenGLC(data); bindGLC(data); break;
    case 'glcresolve': app.innerHTML = warn+screenGLCResolve(data); bindGLCResolve(data); break;
    case 'hunt': app.innerHTML = warn+screenHunt(data); bindHunt(data); break;
    case 'end': app.innerHTML = screenEnd(data); bindEnd(data); break;
    default: app.innerHTML = '<div class="msg">로딩중...</div>';
  }
  updateTimerHostVisibility(data);
}

function bindTeam(data){
  const isLeader = data.currentLeaderId === myId;
  if(!isLeader) return;
  const need = data.missionSizes[data.quest-1];
  teamPickLocal = [];
  magicPickLocal = null;
  function refreshMagicList(){
    document.querySelectorAll('.magicRow').forEach(row=>{
      const id = row.dataset.id;
      row.style.display = teamPickLocal.includes(id) ? 'flex':'none';
      if(!teamPickLocal.includes(id)){
        const radio = row.querySelector('input');
        if(radio.checked){ radio.checked=false; if(magicPickLocal===id) magicPickLocal=null; }
      }
    });
  }
  document.querySelectorAll('#teamPickList input[type=checkbox]').forEach(cb=>{
    cb.onchange = ()=>{
      const id = cb.dataset.id;
      if(cb.checked){
        if(teamPickLocal.length>=need){ cb.checked=false; return; }
        teamPickLocal.push(id);
      } else {
        teamPickLocal = teamPickLocal.filter(x=>x!==id);
      }
      refreshMagicList();
    };
  });
  document.querySelectorAll('input[name=magicPick]').forEach(r=>{
    r.onchange = ()=>{ if(r.checked) magicPickLocal = r.dataset.id; };
  });
  document.getElementById('btnProposeTeam').onclick = ()=>proposeTeam(data);
}

      </ul>
      <div class="msg">${submitCount}/${team.length}명 제출</div>

    <div class="panel">
      <h2>카드를 제출하세요</h2>
      ${hasMagic ? `<div class="small center" style="margin-bottom:8px;">당신은 마법 토큰을 받았습니다.</div>`:''}

      <div class="row">
        ${allowed.includes('success') ? `<button class="good" id="btnSuccess">성공</button>`:''}
        ${allowed.includes('fail') ? `<button class="evil" id="btnFail">실패</button>`:''}
      </div>
      `}
    </div>` : `<div class="panel"><div class="msg">원정대가 아니므로 결과를 기다립니다.</div></div>`}
    ${data.hostId===myId ? `<button class="full ghost" id="btnForceAdvance">⚠ 호스트: 응답 없는 인원 무시하고 강제 진행</button>` : ''}
  </div>`;
}
function bindQuest(data){
  const team = data.team;
  if(team.includes(myId) && !(data.questCards && data.questCards[myId])){
    const s = document.getElementById('btnSuccess');
    const f = document.getElementById('btnFail');
    if(s) s.onclick = ()=>submitQuestCard('success');
    if(f) f.onclick = ()=>submitQuestCard('fail');
  }
  const force = document.getElementById('btnForceAdvance');
  if(force) force.onclick = ()=>forceAdvance(data);
}

/* ---------- 대장 교체 + 부적 지급 ---------- */
function screenHandover(data){
  const isLeader = data.currentLeaderId === myId;
  const needAmulet = (data.amuletCheckpoints||[]).includes(data.lastCompletedQuest);
  const leaderCandidates = eligibleNextLeaders(data);
  return `
  <div class="crt-frame">
    <div class="title-block"><h1>대장 교체</h1></div>
    ${headerBoard(data)}
    <div class="msg">${data.lastCompletedQuest}차 원정 결과: <b>${data.track[data.lastCompletedQuest-1]==='success'?'성공':'실패'}</b> (실패 카드 ${data.lastQuestFails}장)</div>
    ${isLeader ? `
    <div class="panel">
      <h2>다음 원정대장을 선택하세요</h2>
      <ul class="player-list" id="nextLeaderList">
        ${leaderCandidates.map(id=>`
          <li class="checkbox-row" data-id="${id}">
            <input type="radio" name="nextLeader" data-id="${id}">
            <span>${esc(data.players[id].name)}</span>
          </li>`).join('')}
      </ul>
    </div>
    ${needAmulet ? `
    <div class="panel">
      <h2>부적 토큰을 줄 대상</h2>
      <div class="msg" style="padding:2px 0 8px;">부적을 받은 사람은 다른 한 명의 소속을 몰래 확인할 수 있습니다.</div>
      <ul class="player-list" id="amuletPickList"></ul>
    </div>`:''}
    <button class="full" id="btnConfirmHandover">확정</button>
    ` : `<div class="panel"><div class="msg">${esc(data.players[data.currentLeaderId].name)}님이 다음 대장을 고르는 중입니다...</div></div>`}
  </div>`;
}
function bindHandover(data){
  const isLeader = data.currentLeaderId === myId;
  if(!isLeader) return;
  handoverLeaderPick = null;
  handoverAmuletPick = null;
  const needAmulet = (data.amuletCheckpoints||[]).includes(data.lastCompletedQuest);
  function refreshAmuletList(){
    if(!needAmulet) return;
    const list = document.getElementById('amuletPickList');
    if(!list) return;
    const candidates = eligibleAmuletRecipients(data, handoverLeaderPick);
    list.innerHTML = candidates.map(id=>`
      <li class="checkbox-row" data-id="${id}">
        <input type="radio" name="amuletPick" data-id="${id}">
        <span>${esc(data.players[id].name)}</span>
      </li>`).join('') || '<li class="msg">선택 가능한 대상이 없습니다.</li>';
    list.querySelectorAll('input[name=amuletPick]').forEach(r=>{
      r.onchange = ()=>{ if(r.checked) handoverAmuletPick = r.dataset.id; };
    });
  }
  document.querySelectorAll('input[name=nextLeader]').forEach(r=>{
    r.onchange = ()=>{
      if(r.checked){ handoverLeaderPick = r.dataset.id; handoverAmuletPick=null; refreshAmuletList(); }
    };
  });
  document.getElementById('btnConfirmHandover').onclick = ()=>submitHandover(data);
}

      <div class="crt-frame">

          <div class="row" style="margin-top:10px;">
            <button class="evil" id="btnHunt">사냥 시작</button>
            <button class="ghost" id="btnSkipHunt">포기하고 진행</button>
          </div>
        </div>
      </div>`;
    }

    <div class="crt-frame">

      <div class="msg" style="padding:2px 0 8px;">전원 동시에 두 명씩 지목합니다. ${submitCount}/${total}명 완료</div>
      ${already ? `<div class="msg">지목 완료. 결과를 기다리는 중...</div>` : `
      <ul class="player-list" id="glcPickList">
        ${data.order.map(id=>`

}
function bindGLC(data){
  const glc = data.glc || {};
  const myRole = data.players[myId].role;
  if(!glc.hunterDecision){
    if(myRole==='hunter'){
      const h = document.getElementById('btnHunt');
      const sk = document.getElementById('btnSkipHunt');
      if(h) h.onclick = ()=>hunterDecide('hunt');
      if(sk) sk.onclick = ()=>hunterDecide('skip');
    }
    return;
  }
  if(glc.pointing && glc.pointing[myId]) return;
  glcPickLocal = [];
  document.querySelectorAll('#glcPickList input[type=checkbox]').forEach(cb=>{
    cb.onchange = ()=>{
      const id = cb.dataset.id;
      if(cb.checked){
        if(glcPickLocal.length>=2){ cb.checked=false; return; }
        glcPickLocal.push(id);
      } else {
        glcPickLocal = glcPickLocal.filter(x=>x!==id);
      }
    };
  });
  const btn = document.getElementById('btnSubmitGlc');
  if(btn) btn.onclick = ()=>submitGlcPointing(data);
}

/* ---------- 공작 / 대공: 지목 보정 화면 ---------- */
function screenGLCResolve(data){
  const glc = data.glc || {};
  const isDukeTurn = glc.resolveStage === 'duke';
  const isActor = isDukeTurn ? (myId===glc.dukeId) : (myId===glc.archdukeId);
  const roleName = isDukeTurn ? '공작' : '대공';
  if(!isActor){
    return `
    <div class="crt-frame">
      <div class="title-block"><h1>선의 마지막 기회</h1></div>
      ${headerBoard(data)}
      <div class="panel"><div class="msg">${roleName}이(가) 능력을 사용하는 중입니다...</div></div>
    </div>`;
  }
  const pointing = isDukeTurn ? (glc.pointing||{}) : pointingAfterDuke(data);
  const wrongs = wrongPicksList(data, pointing);
  if(isDukeTurn){
    return `
    <div class="crt-frame">
      <div class="title-block"><h1>공작의 능력</h1></div>
      ${headerBoard(data)}
      <div class="panel">
        <h2>무효화할 지목을 선택하세요</h2>
        <div class="msg" style="padding:2px 0 8px;">악이 아닌 사람을 가리킨 잘못된 지목 중 하나를 없앨 수 있습니다.</div>
        <ul class="player-list" id="dukePickList">
          ${wrongs.map(w=>`
            <li class="checkbox-row" data-key="${w.pointerId}|${w.targetId}">
              <input type="radio" name="dukePick" data-key="${w.pointerId}|${w.targetId}">
              <span>${esc(data.players[w.pointerId].name)} → ${esc(data.players[w.targetId].name)}</span>
            </li>`).join('')}
          <li class="checkbox-row" data-key="skip">
            <input type="radio" name="dukePick" data-key="skip">
            <span>능력을 사용하지 않는다</span>
          </li>
        </ul>
        <button class="full" id="btnConfirmDuke">확정</button>
      </div>
    </div>`;
  }
  const coveredEvil = new Set(
    data.order.filter(id=>data.players[id].align==='good')
      .flatMap(id=> pointing[id]||[])
      .filter(id=>data.players[id].align==='evil')
  );
  const evilOptions = data.order.filter(id=>data.players[id].align==='evil' && !coveredEvil.has(id));
  return `
  <div class="crt-frame">
    <div class="title-block"><h1>대공의 능력</h1></div>
    ${headerBoard(data)}
    <div class="panel">
      <h2>재지정할 지목을 선택하세요</h2>
      <div class="msg" style="padding:2px 0 8px;">악이 아닌 사람을 가리킨 잘못된 지목 중 하나를 골라, 아직 아무도 지목하지 않은 악 진영 사람으로 바꿀 수 있습니다.</div>
      <ul class="player-list" id="archdukePickList">
        ${wrongs.map(w=>`
          <li class="checkbox-row" data-key="${w.pointerId}|${w.targetId}">
            <input type="radio" name="archdukePick" data-key="${w.pointerId}|${w.targetId}">
            <span>${esc(data.players[w.pointerId].name)} → ${esc(data.players[w.targetId].name)}</span>
          </li>`).join('') || '<li class="msg">남은 잘못된 지목이 없습니다.</li>'}
        <li class="checkbox-row" data-key="skip">
          <input type="radio" name="archdukePick" data-key="skip">
          <span>능력을 사용하지 않는다</span>
        </li>
      </ul>
      <label>바꿔 지목할 대상 (아직 아무도 지목하지 않은 악 진영만 선택 가능)</label>
      <select id="archdukeNewTarget" style="width:100%; padding:8px;" ${evilOptions.length===0?'disabled':''}>
        <option value="">-- 대상 선택 --</option>
        ${evilOptions.map(id=>`<option value="${id}">${esc(data.players[id].name)}</option>`).join('')}
      </select>
      ${evilOptions.length===0 ? '<div class="msg" style="padding:6px 0 0;">아직 아무도 지목하지 않은 악이 없어, 이번엔 능력을 사용할 수 없습니다.</div>' : ''}
      <button class="full" id="btnConfirmArchduke">확정</button>
    </div>
  </div>`;
}
function bindGLCResolve(data){
  const glc = data.glc || {};
  const isDukeTurn = glc.resolveStage === 'duke';
  const isActor = isDukeTurn ? (myId===glc.dukeId) : (myId===glc.archdukeId);
  if(!isActor) return;
  if(isDukeTurn){
    let pick = null;
    document.querySelectorAll('#dukePickList input[type=radio]').forEach(r=>{
      r.onchange = ()=>{ if(r.checked) pick = r.dataset.key; };
    });
    const btn = document.getElementById('btnConfirmDuke');
    if(btn) btn.onclick = ()=>{
      if(!pick){ alert('선택지를 골라주세요.'); return; }
      const choice = pick==='skip' ? 'skip' : (()=>{
        const [pointerId, targetId] = pick.split('|');
        return {pointerId, targetId};
      })();
      submitDukeChoice(data, choice);
    };
  } else {
    let pick = null;
    document.querySelectorAll('#archdukePickList input[type=radio]').forEach(r=>{
      r.onchange = ()=>{ if(r.checked) pick = r.dataset.key; };
    });
    const btn = document.getElementById('btnConfirmArchduke');
    if(btn) btn.onclick = ()=>{
      if(!pick){ alert('선택지를 골라주세요.'); return; }
      if(pick==='skip'){ submitArchdukeChoice(data, 'skip'); return; }
      const sel = document.getElementById('archdukeNewTarget').value;
      if(!sel){ alert('바꿔 지목할 대상을 선택해주세요.'); return; }
      const [pointerId, targetId] = pick.split('|');
      submitArchdukeChoice(data, {pointerId, targetId, newTargetId: sel});
    };
  }
}

/* ---------- 사냥 (The Hunt) ---------- */
function screenHunt(data){
  const isHunter = data.players[myId].role === 'hunter';
  const roles = goodRolesInPlay(data);
  const targets = data.order.map(id=>({id, name:data.players[id].name}));
  if(data.reserveRole) targets.push({id:'reserve', name:'(사용되지 않은 예비 카드)'});
  return `
  <div class="crt-frame">
    <div class="title-block"><h1>사냥 (The Hunt)</h1></div>
    ${headerBoard(data)}
    ${isHunter ? `
    <div class="panel">
      <h2>선 역할 2명을 지목하세요</h2>
      <div class="msg" style="padding:2px 0 8px;">반드시 한 명은 "성직자"로 지목해야 합니다. 성직자를 포함해 두 명 모두 정확히 맞히면 악의 승리입니다.</div>
      ${[0,1].map(i=>`
        <label>대상 ${i+1}</label>
        <select id="huntTarget${i}" style="width:100%; padding:8px; margin-bottom:6px;">
          <option value="">-- 대상 선택 --</option>
          ${targets.map(t=>`<option value="${t.id}">${esc(t.name)}</option>`).join('')}
        </select>
        <select id="huntRole${i}" style="width:100%; padding:8px; margin-bottom:12px;">
          <option value="">-- 역할 선택 --</option>
          ${roles.map(r=>`<option value="${r}">${ROLE_INFO[r].name}</option>`).join('')}
        </select>
      `).join('')}
      <button class="full evil" id="btnSubmitHunt">사냥 확정 (되돌릴 수 없습니다)</button>
    </div>` : `<div class="panel"><div class="msg">눈먼 사냥꾼이 사냥하는 중입니다...</div></div>`}
  </div>`;
}
function bindHunt(data){
  const isHunter = data.players[myId].role === 'hunter';
  if(!isHunter) return;
  huntPickLocal = [null,null];
  huntRolePickLocal = [null,null];
  [0,1].forEach(i=>{
    document.getElementById('huntTarget'+i).onchange = (e)=>{ huntPickLocal[i] = e.target.value || null; };
    document.getElementById('huntRole'+i).onchange = (e)=>{ huntRolePickLocal[i] = e.target.value || null; };
  });
  document.getElementById('btnSubmitHunt').onclick = ()=>{
    if(!confirm('사냥 결과는 되돌릴 수 없습니다. 확정하시겠습니까?')) return;
    submitHunt(data);
  };
}

    const r = ROLE_INFO[k];
    return `<div class="rule-role-item">
      <span class="align-pill ${r.align}">${r.align==='good'?'선':'악'}</span>
      <div><b>${r.name}</b>${esc(r.desc)}<div class="rule-note" style="margin-top:3px;">▸ ${noteMap[k]}</div></div>
    </div>`;
  }
  return `
  <div class="msg" style="padding:4px 0 10px;">선(善)은 3개의 퀘스트를 성공시키면 승리하고, 악(惡)은 이를 막거나 정체를 숨기면 승리합니다.</div>
  <div class="rule-note" style="margin-bottom:8px;">※ 이 게임은 <b>역할 종류(9종)</b>보다 <b>참가 인원(5~10명)</b>이 더 많아질 수 있어요. "모드레드의 하수인"처럼 특별한 능력이 없는 역할은 인원에 맞춰 여러 명이 중복 배정됩니다 — 아래에서 각 역할이 몇 명한테, 몇 인 게임부터 나오는지 확인하세요.</div>
  <h2 style="font-size:13px; margin:10px 0 2px; color:var(--good-blue);">선 진영 (Good)</h2>
  ${goodKeys.map(item).join('')}
  <h2 style="font-size:13px; margin:14px 0 2px; color:var(--evil-red);">악 진영 (Evil)</h2>
  ${evilKeys.map(item).join('')}
  <div class="rule-note">
    ※ 성직자 · 모르간 르 페이 · 눈먼 사냥꾼은 <b>모든 인원수(5~10인)에 항상 포함</b>되는 필수 역할입니다.<br>
    ※ 단, 5인 게임에서만 성직자/젊은 기사/충성스러운 신하 중 2장만 배분되고 1장이 예비 카드로 숨겨져, 성직자가 예비 카드가 될 수도 있습니다.<br>
    ※ 6인 이상부터는 성직자가 고정 포함되고, 거기에 젊은 기사 또는 말썽꾼 중 하나를 선택해 추가합니다. 공작·대공은 인원수에 따라 포함 여부가 갈립니다 (아래 "인원별 표" 참고).<br>
    ※ 정확한 인원별 구성은 <b>"인원별 표"</b> 탭에서 확인할 수 있어요.
  </div>`;
}
function rulesFlowHtml(){
  const steps = [
    ['정체 확인', '자신의 역할과 진영(선/악)을 확인합니다. 성직자는 첫 원정대장의 소속을, 악 진영(눈먼 사냥꾼 제외)은 서로의 정체를 확인합니다.'],
    ['선택 단계', '원정대장이 이번 퀘스트에 필요한 인원을 지명합니다. 그 후, 원정대원 중 한 명에게 마법 토큰을 줄 수 있습니다. (찬반 투표 없음)'],
    ['원정 수행', '원정대원이 동시에 성공/실패 카드를 제출합니다. 선 진영은 항상 성공만 낼 수 있고, 악 진영만 실패를 낼 수 있습니다. 마법 토큰을 받으면 (면역이 아닌 한) 반드시 성공을 내야 하며, 젊은 기사가 토큰을 받으면 반대로 반드시 실패를 내야 합니다.'],
    ['결과 판정', '해당 퀘스트에 필요한 실패 카드 수 이상이 나오면 퀘스트 실패, 아니면 성공입니다. 3번째 성공 시 선이 즉시 승리합니다.'],
    ['대장 교체', '원정대장이 다음 대장을 지명합니다. 이미 대장을 했던 사람(베테랑 토큰 소지자)은 다시 대장이 될 수 없습니다. 정해진 시점에 부적 토큰이 새로 등장하면, 대장이 부적을 받을 사람도 함께 지정합니다.'],
    ['부적 조사', '부적 토큰을 가진 사람은 매 대장 교체 시 한 명을 조사해 소속(선/악)을 개인적으로 확인할 수 있습니다. 조사받은 사람은 빛바랜 부적 토큰을 받고, 이후 다시는 조사 대상이 될 수 없습니다.'],
    ['선의 마지막 기회', '3번째 성공이 더 이상 불가능해지면 발생합니다. 눈먼 사냥꾼은 이 대신 "사냥"을 선택할 수 있습니다. 사냥을 하지 않으면, 모든 플레이어가 동시에 악으로 의심되는 두 명을 지목합니다.'],
    ['지목 결과', '선 진영의 지목만 집계합니다. 선이 악 전원을 정확히 지목하고 선을 한 명도 지목하지 않았다면 선의 승리, 그렇지 않으면 악의 승리입니다. (공작은 지목 하나를 무효화, 대공은 지목 하나를 다른 사람으로 바꿀 수 있습니다)'],
    ['사냥', '눈먼 사냥꾼이 침묵 속에서 두 명(혹은 예비 카드)을 선택해 정체를 선언합니다. 두 명 중 반드시 한 명은 성직자로 정확히 맞혀야 하며(성직자가 예비 카드로 숨겨져 있어도 마찬가지), 공작/대공은 "충성스러운 신하"로 맞혀도 인정됩니다. 두 명 모두 정확히 맞히면 악의 승리, 아니면 선의 승리입니다.']
  ];
  return steps.map((s,i)=>`
    <div class="rule-flow-step">
      <span class="stepnum">${i+1}</span>
      <div><b>${s[0]}</b><br>${s[1]}</div>
    </div>`).join('');
}
function rulesTableHtml(){
  const goodCompFor = {
    5:  '성직자 + [젊은 기사/충성스러운 신하 중 2장, 1장은 예비]',
    6:  '성직자 + 공작 + [젊은 기사 또는 말썽꾼]',
    7:  '성직자 + 공작 + [젊은 기사 또는 말썽꾼]',
    8:  '성직자 + 공작 + 신하 + [젊은 기사 또는 말썽꾼]',
    9:  '성직자 + 대공 + 신하 + [젊은 기사 또는 말썽꾼]',
    10: '성직자 + 공작 + 대공 + 신하 + [젊은 기사 또는 말썽꾼]'
  };
  let rows = '';
  for(let n=5;n<=10;n++){
    const m = missionFor(n);
    const ck = amuletCheckpointsFor(n);
    const mc = minionCountFor(n);
    rows += `<tr>
      <td>${n}</td>
      <td>${m.sizes.join('-')}</td>
      <td>${m.fails.map((f,i)=>f===2?(i+1)+'차':'').filter(Boolean).join(', ')||'-'}</td>
      <td>${ck.length? ck.map(q=>q+'→'+(q+1)+'차 사이').join('<br>') : '없음'}</td>
      <td>${mc}</td>
    </tr>`;
  }
  const compRows = Object.keys(goodCompFor).map(n=>`<tr><td>${n}</td><td style="text-align:left; padding-left:6px;">${goodCompFor[n]}</td></tr>`).join('');
  return `
  <div class="msg" style="padding:4px 0 8px;">퀘스트별 필요 원정대 인원 / 2실패가 필요한 라운드 / 부적 토큰 등장 시점 / 모드레드의 하수인 수</div>
  <table class="rule-table">
    <tr><th>인원</th><th>1~5차 인원</th><th>2실패 필요</th><th>부적 등장</th><th>하수인 수</th></tr>
    ${rows}
  </table>
  <div class="rule-note">
    ※ 모든 인원수에서 성직자·모르간 르 페이·눈먼 사냥꾼은 각 1명씩 고정 포함됩니다 (단, 성직자는 5인에서만 예비 카드가 될 수 있음).<br>
    ※ 부적 토큰은 한 번 등장하면 이후 매 대장 교체 시 계속 사용할 수 있습니다.
  </div>
  <h2 style="font-size:13px; margin:16px 0 2px; color:var(--good-blue);">인원별 선 진영 구성</h2>
  <table class="rule-table">
    <tr><th>인원</th><th>선 진영 역할 구성</th></tr>
    ${compRows}
  </table>`;
}
function renderRulesModal(){
  const content = document.getElementById('rulesContent');
  if(!content) return;
  content.innerHTML = `
    <div class="modal-section active" data-panel="roles">${rulesRoleHtml()}</div>
    <div class="modal-section" data-panel="flow">${rulesFlowHtml()}</div>
    <div class="modal-section" data-panel="table">${rulesTableHtml()}</div>`;
}
function openRulesModal(){
  renderRulesModal();
  document.getElementById('rulesModal').classList.add('open');
}
function closeRulesModal(){
  document.getElementById('rulesModal').classList.remove('open');
}
function initRulesModal(){
  const fab = document.getElementById('rulesFab');
  const closeBtn = document.getElementById('rulesCloseBtn');
  const overlay = document.getElementById('rulesModal');
  if(fab) fab.onclick = openRulesModal;
  if(closeBtn) closeBtn.onclick = closeRulesModal;
  if(overlay) overlay.onclick = (e)=>{ if(e.target===overlay) closeRulesModal(); };
  document.querySelectorAll('.modal-tab').forEach(tab=>{
    tab.onclick = ()=>{
      document.querySelectorAll('.modal-tab').forEach(t=>t.classList.remove('active'));
      document.querySelectorAll('.modal-section').forEach(s=>s.classList.remove('active'));
      tab.classList.add('active');
      const panel = document.querySelector(`.modal-section[data-panel="${tab.dataset.tab}"]`);
      if(panel) panel.classList.add('active');
    };
  });
}

/* ---------- 시작 ---------- */
initRulesModal();
if(!tryAutoRejoin()){
  boot();
}
</script>
</body>
</html>
